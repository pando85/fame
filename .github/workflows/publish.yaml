name: publish

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  NODE_VERSION: 22.14.0

jobs:
  checks:
    if: github.event_name != 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Test Build
        run: |
          if [ -e yarn.lock ]; then
            yarn install --frozen-lockfile
          elif [ -e package-lock.json ]; then
            npm ci
          else
            npm i
          fi
          npm run build
  gh-release:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
      - uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.GH_PAGES_DEPLOY }}
      - name: Release to GitHub Pages
        env:
          USE_SSH: true
          GIT_USER: git
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "gh-actions"
          if [ -e yarn.lock ]; then
            yarn install --frozen-lockfile
          elif [ -e package-lock.json ]; then
            npm ci
          else
            npm i
          fi
          npm run deploy

  android-release:
    if: github.event_name != 'pull_request'
    needs: gh-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2
      - name: Check for Android changes
        id: android-changes
        run: |
          if git diff --name-only HEAD^ HEAD | grep -qE '^(android/|capacitor\.config\.|package\.json|package-lock\.json|\.github/workflows/publish\.yaml)'; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi
      - uses: actions/setup-node@v6
        if: steps.android-changes.outputs.changed == 'true'
        with:
          node-version: ${{ env.NODE_VERSION }}
      - uses: actions/setup-java@v5
        if: steps.android-changes.outputs.changed == 'true'
        with:
          distribution: 'temurin'
          java-version: '21'
      - name: Setup Android SDK
        if: steps.android-changes.outputs.changed == 'true'
        uses: android-actions/setup-android@v4
      - name: Install dependencies
        if: steps.android-changes.outputs.changed == 'true'
        run: |
          if [ -e yarn.lock ]; then
            yarn install --frozen-lockfile
          elif [ -e package-lock.json ]; then
            npm ci
          else
            npm i
          fi
      - name: Build web app
        if: steps.android-changes.outputs.changed == 'true'
        run: npm run build
      - name: Sync Capacitor
        if: steps.android-changes.outputs.changed == 'true'
        run: npx cap sync android
      - name: Decode keystore
        if: steps.android-changes.outputs.changed == 'true'
        run: |
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/keystore.jks
          fi
      - name: Build release APK
        if: steps.android-changes.outputs.changed == 'true'
        working-directory: android
        run: ./gradlew assembleRelease
        env:
          KEYSTORE_PATH: ${{ secrets.KEYSTORE_BASE64 != '' && 'keystore.jks' || '' }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      - name: Get version
        if: steps.android-changes.outputs.changed == 'true'
        id: version
        run: echo "VERSION=$(date +%Y.%m.%d)-${GITHUB_SHA:0:7}" >> $GITHUB_OUTPUT
      - name: Create GitHub Release
        if: steps.android-changes.outputs.changed == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-${{ steps.version.outputs.VERSION }}
          name: Fame Android ${{ steps.version.outputs.VERSION }}
          files: android/app/build/outputs/apk/release/app-release.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
